metadata:
  name: "suse-product"
  version: "4.2.0"
  creationDate: "2025-12-08"
corePlatform:
  # Registry path to the release manifest OCI image of the Core Platform that this SUSE Product extends
  image: "registry.suse.com/beta/uc/release-manifest:0.6_rke2_1.35"
components:
  systemd:
    extensions:
      - name: "longhorn"
        image: "registry.suse.com/beta/uc/longhorn:5.36-1.88"
  helm:
    charts:
      - chart: "cert-manager"
        version: "v1.17.2"
        namespace: "cert-manager"
        repository: "jetstack"
        values:
          crds:
            enabled: true
      - chart: "rancher"
        version: "2.13.0"
        namespace: "cattle-system"
        repository: "rancher"
        values:
          replicas: 1
        dependsOn:
          - name: "cert-manager"
            type: "helm"
      - chart: "longhorn-crd"
        version: "107.0.0+up1.9.1"
        namespace: "longhorn-system"
        repository: "rancher-charts"
      - chart: "longhorn"
        version: "107.0.0+up1.9.1"
        namespace: "longhorn-system"
        repository: "rancher-charts"
        dependsOn:
          - name: "longhorn-crd"
            type: "helm"
          - name: "longhorn"
            type: "sysext"
    repositories:
      - name: "jetstack"
        url: "https://charts.jetstack.io"
      - name: "rancher"
        url: "https://releases.rancher.com/server-charts/stable"
      - name: "rancher-charts"
        url: "https://charts.rancher.io"
